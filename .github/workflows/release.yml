name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  python-package:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          test "${GITHUB_REF_NAME}" = "v${PACKAGE_VERSION}"
      - name: Run Python tests
        run: |
          python -m pip install --upgrade build ".[test]"
          pytest -q
      - name: Build Python distributions
        run: python -m build
      - name: Validate wheel installation
        run: |
          python -m pip install dist/*.whl
          (cd /tmp && python -c "import pypulseq_audio; print(pypulseq_audio.__all__)")
      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/
          if-no-files-found: error

  webview-package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: webview
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webview/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Validate JavaScript
        run: |
          for file in js/*.js; do node --check "$file"; done
          node --check build.mjs
          node --check serve.mjs
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser tests
        run: npm run test:ci
      - name: Build webview
        run: npm run build
      - name: Package webview
        run: |
          cd dist
          zip -r "../listen-to-your-pulseq-webview-${GITHUB_REF_NAME}.zip" .
      - name: Upload webview distribution
        uses: actions/upload-artifact@v4
        with:
          name: webview-dist
          path: webview/listen-to-your-pulseq-webview-*.zip
          if-no-files-found: error

  pypi:
    runs-on: ubuntu-latest
    needs: python-package
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    runs-on: ubuntu-latest
    needs: [python-package, webview-package, pypi]
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-dist'
          path: release-assets
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true
